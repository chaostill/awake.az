name = "awake-az-web"
main = ".open-next/worker.js"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

# Disable the *.workers.dev URL — serve only via custom domain
workers_dev = false

# Custom domains — Cloudflare auto-creates DNS records for these
routes = [
  { pattern = "awake.az", custom_domain = true },
  { pattern = "www.awake.az", custom_domain = true },
]

[assets]
directory = ".open-next/assets"
binding = "STATIC_ASSETS"
